    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="main-container">
            <div class="wraper">
                <header>
                    <img src="Assets/logo 1.png" alt="">

                    <div class="button">
                        <button class="button-1"><span class="si--dashboard-fill"></span>Home</button>
                        <button class="button-2"><span class="material-symbols--history-rounded"></span>History</button>
                    </div>

                    <div class="profile">
                        <img src="Assets/profile.png" alt="">
                        <p>Admin</p>
                        <span class="iconamoon--arrow-up-2"></span>
                    </div>
                </header>
                
                <div class="title">
                    <h1>Automatic Bridge Monitoring</h1>
                    <h3>Manage and Mantaining your automatic bridge</h3>
                </div>
            </div>

            <div class="panel">
                <div class="control-panel">
                    <div class="wraper-1">
                        <h2>Control Panel</h2>
                        <div class="toggle">
                            <div class="auto">Auto</div>
                            <div class="manual">Manual</div>
                        </div>
                    </div>

                    <div class="wraper-2">
                        <div class="bridge-gate">
                            <div class="bridge">
                                <h3>Bridge</h3>
                                <div class="button">
                                    <div class="icon"></div>
                                    <p>Open</p>
                                </div>
                            </div>
                            <div class="gate">
                                <div class="button">
                                    <button class="open">Open</button>
                                    <button class="closed">Closed</button>
                                </div>
                                <div class="title"><p>Gate</p></div>
                            </div>
                        </div>
                        <div class="alarm">
                            <h3>Alarm</h3>
                            <div class="wraper">
                                <button><span class="solar--bell-bold"></span></button>
                                <div class="status">
                                    <div class="circle"></div>
                                    <p>active</p>
                                </div>
                            </div>
                        </div>
                        <div class="traffic">
                            <h3>Traffic Light</h3>
                            <img src="Assets/red lights.png" alt="" srcset="">
                            <div class="button">
                                <div class="red">Red</div>
                                <div class="green">Green</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="status-panel">
                    <h2>Status Panel</h2>
                    <div class="wraper-3">
                        <div class="detector-stat">
                            <div class="detector">
                                <img src="Assets/ship.png" alt="">
                                <div class="sensor1"><span class="mynaui--danger-diamond-solid"></span></span>Detected</div>
                                <div class="divider"><p>In</p><p>Out</p></div>
                                <div class="sensor2"><span class="mynaui--danger-diamond-solid"></span></span>Detected</div>
                            </div>
                            <div class="ship-stat">
                                <div class="container">
                                    <div class="iconframe"></div>
                                    <p>Ship Today</p>
                                </div>
                                <h3>20</h3>
                            </div>
                        </div>
                        <div class="grid-stat">
                            <div class="grid">
        <div class="icon-title">
            <div class="frame"></div>
            <p>Bridge</p>
        </div>
        <h2>Opened</h2>
    </div>

    <div class="grid">
        <div class="icon-title">
            <div class="frame"></div>
            <p>Gate</p>
        </div>
        <h2>Closed</h2>
    </div>

    <div class="grid">
        <div class="icon-title">
            <div class="frame"></div>
            <p>Traffic Light</p>
        </div>
        <h2>Red</h2>
    </div>

    <div class="grid">
        <div class="icon-title">
            <div class="frame"></div>
            <p>Alarm</p>
        </div>
        <h2>Active</h2>
    </div>
                        
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    </html>
